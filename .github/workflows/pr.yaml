name: PR

on:
  pull_request:
    branches: [ main ]

  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Build and execute tests (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
      - run: zig build test --summary all

  lint:
    runs-on: ubuntu-latest
    name: Check non-conforming formated files
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
      - run: zig fmt build.zig src/ --check

  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Build and smoke test (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v7
      - uses: mlugg/setup-zig@v2
      - run: zig build --summary all

      - name: Print help and check commands
        run: |
          ./zig-out/bin/stabilis --help | grep -q stabilis
          ./zig-out/bin/stabilis --help | grep -q build
          ./zig-out/bin/stabilis --help | grep -q serve
          ./zig-out/bin/stabilis --help | grep -q new

      - name: Print version and check non-empty
        run: |
          out=$(./zig-out/bin/stabilis --version)
          test -n "$out"

      - name: Build example and show generated tree
        run: |
          ./zig-out/bin/stabilis build -S example -d tmp/site -c
          find tmp/site | sort

      - name: Run watcher and verify rebuild on file change
        run: |
          ./zig-out/bin/stabilis serve -S example -d tmp/site > tmp/watch.log 2>&1 &
          WATCH_PID=$!
          sleep 1
          echo "smoke marker" >> example/content/posts/hello-world.md
          sleep 1
          kill $WATCH_PID
          cat tmp/watch.log
