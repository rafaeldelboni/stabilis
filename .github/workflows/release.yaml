name: Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-linux-musl
            os: ubuntu-latest
            asset_name: stabilis-${{ github.ref_name }}-x86_64-linux-musl
          - target: aarch64-linux-musl
            os: ubuntu-latest
            asset_name: stabilis-${{ github.ref_name }}-aarch64-linux-musl
          - target: aarch64-macos
            os: macos-latest
            asset_name: stabilis-${{ github.ref_name }}-aarch64-macos

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2

      - run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSmall --summary all

      - run: |
          mkdir -p ${{ matrix.asset_name }}
          cp zig-out/bin/stabilis ${{ matrix.asset_name }}/stabilis
          zip -r ${{ matrix.asset_name }}.zip ${{ matrix.asset_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: |
          mkdir -p release
          find artifacts -name '*.zip' -exec cp {} release/ \;
          cp install.sh release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
