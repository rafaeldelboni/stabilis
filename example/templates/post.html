{{> partials/header.html }}

  <article>
    <h1>{{ title }}</h1>
    <time datetime="{{ date }}">{{ date_human }}</time>
    {{# tags }}
    <span class="tag">
      <a href="{{ url }}">{{ title }}</a>
    </span>
    {{/ tags }}
    <div class="content">
      {{{ body }}}
    </div>
  </article>

</body>
</html>
